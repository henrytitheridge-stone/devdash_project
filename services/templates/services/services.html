{% extends "base.html" %}

{% load static %}

{% block content %}
<div class="hero-bg">
    <div class="overlay"></div>
    <div class="container py-5">
        <div class="row">
            <div class="col text-center mt-3">
                <h2 class="logo-font text-black">Our Professional Audits</h2>
                <hr class="w-50 mb-5">
            </div>
        </div>
        <div class="row">
            <div class="service-container col-10 offset-1">
                <div class="row">
                    <!-- Display all 3 services from the db in a responsive grid -->
                    {% for service in services %}
                    <div class="col-12 col-md-6 col-lg-4 mb-5">
                        <div class="card h-100 border-0 shadow-sm">
                            
                                <!-- Display info and price -->
                                <div class="card-body pb-0 text-center">
                                    <a href="{% url 'service_detail' service.id %}" class="text-decoration-none service-card-link">
                                        <p class="mb-0 font-weight-bold logo-font text-black">{{ service.name }}</p>
                                    <a href=""></a>
                                    <p class="small text-muted mt-2">{{ service.description|truncatewords:14 }}</p>
                                </div>
                                <div class="card-footer bg-white pt-0 border-0 text-center">
                                    <div class="row">
                                        <div class="col">
                                            <p class="lead mb-0 font-weight-bold">${{ service.price }}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
