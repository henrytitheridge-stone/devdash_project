{% extends "base.html" %}
{% load static %}

{% block page_header %}
    <!-- Spacing container to prevent content hiding behind fixed header -->
    <div class="container header-container">
        <div class="row">
            <div class="col"></div>
        </div>
    </div>
{% endblock %}

{% block content %}
<div class="hero-bg">
    <div class="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            
            <div class="col-12 col-md-6 col-lg-4">
                <div class="service-details-container mb-5 mt-md-5">
                    <h2 class="mb-0 logo-font text-black">{{ service.name }}</h2>
                    <p class="lead mb-0 text-left font-weight-bold">${{ service.price }}</p>
                    <p class="mt-3">{{ service.description }}</p>

                    <!-- Edit & delete links visible only to site owners -->
                    {% if request.user.is_superuser %}
                    <small class="ml-3">
                        <a href="{% url 'edit_service' service.id %}" class="btn btn-sm btn-black rounded-0">Edit</a> | 
                        <a class="text-danger" href="{% url 'delete_service' service.id %}">Delete</a>
                    </small>
                    {% endif %}

                    <!-- Purchase form to add an item to the basket -->
                    <form class="form" action="{% url 'add_to_basket' service.id %}" method="POST">
                        {% csrf_token %}

                            <!-- Quantity hidden and defaulted to 1 for audits -->
                            <input type="hidden" name="quantity" value="1">
                            <div class="col-12 px-0">
                                <a href="{% url 'services' %}" class="btn btn-outline-black rounded-0 mt-5">
                                    <span class="icon">
                                        <i class="fas fa-chevron-left"></i>
                                    </span>
                                    <span class="text-uppercase">Back to Audits</span>
                                </a>
                                <input type="submit" class="btn btn-black rounded-0 text-uppercase mt-5" value="Add to Basket">
                            </div>

                            <!-- Keeps the user on the current page after adding to basket -->
                            <input type="hidden" name="redirect_url" value="{{ request.path }}">
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
