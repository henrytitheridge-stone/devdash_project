<!-- Contains the main marketing call-to-action:
 subscription to a newsletter via a single-field (email) form -->

<footer id="newsletter-footer" class="container-fluid bg-white border-top mt-4">
    <div class="row py-2">
        <div class="col-12 col-md-6 offset-md-3 text-center">
            <h5 class="logo-font text-uppercase">Stay updated</h5>
            <p class="small text-muted">Get regular insights, the latest offers and top tips when you subscribe to our newsletter.</p>
            
            <!-- Newsletter Signup Form -->
            <form action="{% url 'newsletter_signup' %}" method="POST" class="form-inline justify-content-center">
                {% csrf_token %}
                <div class="input-group">
                    <input type="email" name="email" class="form-control border-black rounded-0" placeholder="Email Address" required>
                    <div class="input-group-append">
                        <button class="btn btn-black rounded-0 text-uppercase" type="submit">Subscribe</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</footer>
